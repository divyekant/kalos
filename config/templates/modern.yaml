# Kalos Template: Modern
# Current web standards — generous spacing, rounded corners, accessible
extends: defaults

tokens:
  colors:
    primary: "#6366F1"
    secondary: "#EC4899"
    neutral: "zinc"
    semantic:
      success: "#22C55E"
      warning: "#F59E0B"
      error: "#EF4444"
      info: "#3B82F6"
  typography:
    font_family: "Inter, system-ui, sans-serif"
    scale: "1.25"
    base_size: 16
  spacing:
    base: 4
    scale: [0, 1, 2, 3, 4, 6, 8, 12, 16, 24, 32]
  radii:
    none: 0
    sm: 4
    md: 8
    lg: 12
    xl: 16
    full: 9999

rules:
  colors:
    max_unique: 12
    require_semantic: true
  typography:
    max_font_families: 2
    require_scale: true
  spacing:
    require_base_unit: true
  accessibility:
    min_contrast: 4.5
    require_alt_text: true

adapters:
  - pencil
  - tailwind

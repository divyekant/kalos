# Kalos Template: Brand
# Corporate-strict — tight palette, exact colors only, highest enforcement
extends: defaults

tokens:
  colors:
    primary: "#1E3A5F"
    secondary: "#2563EB"
    neutral: "slate"
    semantic:
      success: "#16A34A"
      warning: "#CA8A04"
      error: "#DC2626"
      info: "#2563EB"
  typography:
    font_family: "system-ui, sans-serif"
    scale: "1.25"
    base_size: 16
  spacing:
    base: 4
    scale: [0, 1, 2, 3, 4, 6, 8, 12, 16, 24, 32]
  radii:
    none: 0
    sm: 4
    md: 8
    lg: 12
    full: 9999

rules:
  colors:
    max_unique: 6
    require_semantic: true
  typography:
    max_font_families: 1
    require_scale: true
  spacing:
    require_base_unit: true
  accessibility:
    min_contrast: 7.0
    require_alt_text: true

brands:
  active: "default"
  palettes:
    default:
      colors:
        primary: "#1E3A5F"
        secondary: "#2563EB"
        neutral: "slate"
      typography:
        font_family: "system-ui, sans-serif"

adapters:
  - pencil
  - tailwind
